<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICQ</title>
<style>
/* ════════════════════════════════════════════════════════════
   ICQ CLASSIC — app.html
   Layout: [Chat window LEFT 70%] [Contact List RIGHT ~270px]
   All colors & fonts explicit — no inheritance surprises.
   ════════════════════════════════════════════════════════════ */

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Win98 palette ── */
html, body {
  width: 100%; height: 100%;
  background: #C0C0C0;
  font-family: 'Tahoma', 'MS Sans Serif', 'Arial', sans-serif;
  font-size: 11px;
  color: #000000;
  overflow: hidden;
  -webkit-font-smoothing: none;
}

/* ════ OUTER TITLE BAR ════════════════════════════════════════ */
#outer-tb {
  height: 20px;
  background: linear-gradient(90deg, #000080 0%, #1084D0 100%);
  display: flex;
  align-items: center;
  padding: 0 3px;
  gap: 4px;
  -webkit-app-region: drag;
  flex-shrink: 0;
}
#outer-tb-title { flex: 1; color: #FFFFFF; font-size: 11px; font-weight: bold; }
#outer-tb-btns  { display: flex; gap: 2px; -webkit-app-region: no-drag; }
.wbtn {
  width: 16px; height: 14px;
  background: #C0C0C0;
  border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF;
  color: #000000;
  font-size: 7px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; line-height: 1;
}
.wbtn:active { border-color: #808080 #FFFFFF #FFFFFF #808080; }

/* ════ MAIN BODY ══════════════════════════════════════════════ */
#body {
  display: flex;
  height: calc(100vh - 20px);
  padding: 3px;
  gap: 3px;
  background: #C0C0C0;
}

/* ════ LEFT: CHAT WINDOW ══════════════════════════════════════ */
#chat {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  border: 2px solid; border-color: #808080 #FFFFFF #FFFFFF #808080;
  background: #C0C0C0;
}

/* Chat window inner title bar (plain gray, like reference) */
#chat-tb {
  height: 20px; flex-shrink: 0;
  background: #C0C0C0;
  border-bottom: 1px solid #808080;
  display: flex; align-items: center; padding: 0 6px;
}
#chat-tb-title {
  flex: 1;
  font-size: 11px; font-weight: normal;
  color: #000000;
  text-align: center;
}
#chat-tb-btns { display: flex; gap: 1px; }

/* User Details fieldset */
fieldset#udet {
  margin: 3px 5px 2px;
  padding: 1px 8px 3px;
  border: 1px solid #808080;
  background: #C0C0C0;
  flex-shrink: 0;
}
fieldset#udet legend { font-size: 10px; color: #000000; padding: 0 3px; }
#udet-row {
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
  font-size: 11px; color: #000000;
}
.udlbl { font-weight: bold; color: #000000; }

/* Message log */
#log {
  flex: 1; min-height: 0;
  margin: 0 5px;
  border: 2px solid; border-color: #808080 #FFFFFF #FFFFFF #808080;
  background: #FFFFFF;
  overflow-y: auto;
  padding: 4px 6px;
}
/* ── All text in log must be explicitly colored ── */
#log * { color: #000000; font-family: 'Tahoma','MS Sans Serif','Arial',sans-serif; font-size: 11px; }
.mpfx {
  font-weight: bold;
  color: #000080 !important;
  display: block;
  margin-top: 4px;
}
.mpfx.out { color: #000080 !important; }
.mpfx.in  { color: #B00000 !important; }
.mtxt { color: #000000 !important; display: block; padding-left: 2px; margin-bottom: 2px; }
.mday { color: #808080 !important; font-size: 10px; display: block; text-align: center; margin: 6px 0 2px; border-top: 1px solid #C0C0C0; padding-top: 4px; }

/* Welcome / status area inside log */
#welcome {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
#welcome .ico { font-size: 36px; }
#welcome .ttl { font-size: 14px; font-weight: bold; color: #000000; }
#welcome .sub { font-size: 11px; color: #808080; text-align: center; }

/* Progress/send bar */
#send-bar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  padding: 2px 5px;
  background: #C0C0C0;
  border-top: 1px solid #FFFFFF;
}
.sicon {
  width: 20px; height: 18px;
  background: #C0C0C0;
  border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 9px; color: #000000;
}
#mlen-lbl { font-size: 10px; color: #808080; }
#mlen-bar {
  width: 60px; height: 10px;
  border: 1px solid; border-color: #808080 #FFFFFF #FFFFFF #808080;
  background: #FFFFFF;
}
#mlen-fill { height: 100%; background: #FFFF00; width: 0; }
#mlen-cnt { font-size: 11px; font-weight: bold; color: #000000; }
#btn-send {
  margin-left: auto;
  padding: 1px 14px;
  font-size: 11px; font-weight: bold;
  font-family: 'Tahoma','MS Sans Serif','Arial',sans-serif;
  color: #000000; background: #C0C0C0; cursor: pointer;
  border: 2px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF;
}
#btn-send:active { border-color: #808080 #FFFFFF #FFFFFF #808080; }

/* Message input */
#input {
  flex-shrink: 0;
  margin: 2px 5px 4px;
  height: 60px;
  border: 2px solid; border-color: #808080 #FFFFFF #FFFFFF #808080;
  padding: 3px 4px;
  font-family: 'Tahoma','MS Sans Serif','Arial',sans-serif;
  font-size: 11px;
  color: #000000;
  background: #FFFFFF;
  resize: none; outline: none;
  user-select: text;
}

/* ════ RIGHT: CONTACT LIST ════════════════════════════════════ */
#cl {
  width: 265px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border: 2px solid; border-color: #808080 #FFFFFF #FFFFFF #808080;
  background: #C0C0C0;
}

/* CL title bar */
#cl-tb {
  height: 20px; flex-shrink: 0;
  background: linear-gradient(90deg, #000080 0%, #1084D0 100%);
  display: flex; align-items: center; padding: 0 3px; gap: 4px;
}
#cl-tb-title { flex: 1; color: #FFFFFF; font-size: 11px; font-weight: bold; }
#cl-tb-btns  { display: flex; gap: 1px; }

/* CL icon row */
#cl-icons {
  height: 24px; flex-shrink: 0;
  display: flex; align-items: center; gap: 2px;
  padding: 2px 3px;
  border-bottom: 1px solid #808080;
}
.clibtn {
  height: 20px;
  background: #C0C0C0;
  border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #000000; font-size: 9px;
  padding: 0 4px;
}
#icq-word { font-size: 11px; font-weight: bold; font-style: italic; }

/* CL scroll area */
#cl-scroll {
  flex: 1; min-height: 0; overflow-y: auto;
  background: #FFFFFF;
  border: 2px solid; border-color: #808080 #FFFFFF #FFFFFF #808080;
  margin: 2px 3px;
}
.cl-sect {
  font-size: 10px; color: #808080;
  background: #FFFFFF;
  padding: 3px 6px 1px;
  border-bottom: 1px solid #D0D0D0;
  user-select: none;
}
.cl-contact {
  display: flex; align-items: center; gap: 3px;
  padding: 2px 8px;
  cursor: pointer; background: #FFFFFF;
  border-bottom: 1px solid #F8F8F8;
  min-height: 18px;
}
.cl-contact:hover  { background: #D6EEDA; }
.cl-contact.active { background: #000080; }
.cl-contact.active .cname { color: #FFFFFF !important; }
.cl-flower { font-size: 11px; flex-shrink: 0; line-height: 1; }
.cname { font-size: 11px; color: #006600; font-weight: bold; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cname.offline { color: #555555 !important; font-weight: normal; }
.cunread {
  font-size: 9px; font-weight: bold; color: #FFFFFF;
  background: #CC0000; padding: 0 3px; min-width: 14px; text-align: center;
}

/* CL bottom buttons */
#cl-btm {
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 1px;
  padding: 2px 3px 3px;
  border-top: 1px solid #FFFFFF;
}
.clbtn {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px; font-size: 11px; font-weight: bold;
  font-family: 'Tahoma','MS Sans Serif','Arial',sans-serif;
  color: #000000; background: #C0C0C0; cursor: pointer;
  border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF;
}
.clbtn:active { border-color: #808080 #FFFFFF #FFFFFF #808080; }
#cl-avail {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 8px; font-size: 11px; font-weight: bold;
  color: #000000; background: #C0C0C0;
  border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF;
}

/* ── Win98 scrollbars ── */
::-webkit-scrollbar       { width: 16px; height: 16px; }
::-webkit-scrollbar-track { background: #C0C0C0; }
::-webkit-scrollbar-thumb { background: #C0C0C0; border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF; border-radius: 0; }
::-webkit-scrollbar-button { display: block; width: 16px; height: 16px; background: #C0C0C0; border: 1px solid; border-color: #FFFFFF #808080 #808080 #FFFFFF; }
</style>
</head>
<body>

<!-- Outer Win98 title bar -->
<div id="outer-tb">
  <span style="font-size:12px">🌸</span>
  <span id="outer-tb-title">ICQ Messenger</span>
  <div id="outer-tb-btns">
    <div class="wbtn" id="btn-min">_</div>
    <div class="wbtn" id="btn-max">□</div>
    <div class="wbtn" id="btn-close" style="font-size:8px">✕</div>
  </div>
</div>

<div id="body">

  <!-- ════ LEFT: CHAT WINDOW ════ -->
  <div id="chat">

    <!-- Chat inner title (plain gray like reference) -->
    <div id="chat-tb">
      <div id="chat-tb-title">— Select a contact —</div>
      <div id="chat-tb-btns">
        <div class="wbtn">_</div>
        <div class="wbtn">□</div>
        <div class="wbtn" style="font-size:8px">✕</div>
      </div>
    </div>

    <!-- User Details fieldset -->
    <fieldset id="udet">
      <legend>User Details</legend>
      <div id="udet-row">
        <span class="udlbl">Nick:</span>
        <span id="ud-nick" style="color:#000000">—</span>
        &nbsp;
        <span class="udlbl">ICQ#:</span>
        <span style="color:#000000">692648192</span>
        &nbsp;
        <span class="udlbl">Status:</span>
        <span>🌸</span>
      </div>
    </fieldset>

    <!-- Message log -->
    <div id="log">
      <div id="welcome">
        <div class="ico">🌸</div>
        <div class="ttl">ICQ</div>
        <div class="sub" id="status-lbl">Connecting to WhatsApp…</div>
        <div style="margin-top:8px">
          <button id="btn-signin" style="padding:3px 14px;font-size:11px;font-family:Tahoma,Arial;background:#C0C0C0;border:2px solid;border-color:#FFF #808080 #808080 #FFF;cursor:pointer;display:none">
            Sign in to WhatsApp
          </button>
        </div>
      </div>
    </div>

    <!-- Send bar -->
    <div id="send-bar">
      <div class="sicon" title="Attach">📎</div>
      <div class="sicon" title="Emoticons">😊</div>
      <div class="sicon" title="Font">𝗔</div>
      <span id="mlen-lbl">Message Length</span>
      <div id="mlen-bar"><div id="mlen-fill"></div></div>
      <span id="mlen-cnt">0/1024</span>
      <button id="btn-send">Send</button>
    </div>

    <!-- Compose input -->
    <textarea id="input" placeholder="Type a message…" maxlength="1024"></textarea>

  </div><!-- #chat -->

  <!-- ════ RIGHT: CONTACT LIST ════ -->
  <div id="cl">

    <div id="cl-tb">
      <span style="font-size:12px">🌸</span>
      <span id="cl-tb-title">22536582</span>
      <div id="cl-tb-btns">
        <div class="wbtn">_</div>
        <div class="wbtn">□</div>
        <div class="wbtn" style="font-size:8px">✕</div>
      </div>
    </div>

    <div id="cl-icons">
      <div class="clibtn" id="icq-word">ICQ</div>
      <div class="clibtn">🌸</div>
      <div class="clibtn">👤</div>
      <div class="clibtn">ℹ</div>
      <div class="clibtn">🔍</div>
    </div>

    <div id="cl-scroll">
      <div class="cl-sect" id="cl-loading">── Loading ──</div>
    </div>

    <div id="cl-btm">
      <button class="clbtn">🖥 System</button>
      <button class="clbtn">🔍 Search/Add Users</button>
      <div id="cl-avail">🌸 Available <span style="margin-left:auto">▼</span></div>
    </div>

  </div><!-- #cl -->

</div><!-- #body -->

<script>
'use strict';
/* All text color is set in CSS — this JS only manages content/state */

const $ = id => document.getElementById(id);
const bridge = window.icq; // exposed by preload.js

// ── State ──────────────────────────────────────────────────────────────────
let contacts = [], messages = [], chatName = '', selIdx = -1, lastMsgLen = 0;

// ── Window controls ────────────────────────────────────────────────────────
$('btn-min').onclick   = () => bridge.minimize();
$('btn-max').onclick   = () => bridge.maximize();
$('btn-close').onclick = () => bridge.close();

// ── Status from main ───────────────────────────────────────────────────────
bridge.onStatus(d => {
  const lbl = $('status-lbl');
  const btn  = $('btn-signin');
  if (d.status === 'qr' || d.status === 'needsLogin') {
    lbl.textContent = 'Not signed in to WhatsApp.';
    btn.style.display = 'inline-block';
  } else if (d.status === 'ready') {
    lbl.textContent  = 'Select a contact to chat.';
    btn.style.display = 'none';
  }
});

// ── Sign-in button (shows hidden WA window) ────────────────────────────────
$('btn-signin').onclick = () => bridge.showWa();

// ── Data from main (every 2s) ──────────────────────────────────────────────
bridge.onData(d => {
  contacts = d.contacts || [];
  messages = d.messages || [];
  chatName = d.chatName || '';
  renderCL();
  if (chatName && messages.length !== lastMsgLen) renderMsgs();
});

// ── Render contact list ────────────────────────────────────────────────────
function renderCL() {
  const scr = $('cl-scroll');
  if (!contacts.length) {
    scr.innerHTML = '<div class="cl-sect">── Loading ──</div>';
    return;
  }
  let h = '<div class="cl-sect">Online</div>';
  contacts.forEach((c, i) => {
    const act   = i === selIdx ? ' active' : '';
    const badge = c.unread ? `<span class="cunread">${esc(c.unread)}</span>` : '';
    h += `<div class="cl-contact${act}" data-i="${i}">
      <span class="cl-flower">🌸</span>
      <span class="cname">${esc(c.name)}</span>
      ${badge}
    </div>`;
  });
  scr.innerHTML = h;
  scr.querySelectorAll('.cl-contact').forEach(el => {
    el.onclick = () => selectContact(+el.dataset.i);
  });
}

// ── Select contact ─────────────────────────────────────────────────────────
function selectContact(i) {
  selIdx = i;
  const c = contacts[i];
  if (!c) return;
  bridge.clickContact(i);
  // Update chat title & nick immediately
  $('chat-tb-title').textContent = c.name + ' Message Dialog';
  $('ud-nick').textContent = c.name;
  chatName = c.name;
  // Hide welcome, clear log, show loading
  const log = $('log');
  log.innerHTML = '<div style="padding:6px;color:#808080;font-size:11px">Loading messages…</div>';
  lastMsgLen = 0;
  renderCL(); // re-render to show active state
}

// ── Render messages ────────────────────────────────────────────────────────
function renderMsgs() {
  if (!messages.length) return;
  lastMsgLen = messages.length;

  const log = $('log');
  // Hide welcome if still showing
  const wc = $('welcome');
  if (wc) wc.remove();

  const atBot = log.scrollHeight - log.scrollTop - log.clientHeight < 50;
  let h = '';
  messages.forEach(m => {
    const who  = m.isOut ? 'You' : esc(chatName);
    const tm   = m.time  ? ` [${esc(m.time)}]` : '';
    const cls  = m.isOut ? 'out' : 'in';
    h += `<span class="mpfx ${cls}">${who}${tm}:</span><span class="mtxt">${esc(m.text)}</span>`;
  });
  log.innerHTML = h;
  if (atBot) log.scrollTop = log.scrollHeight;
}

// ── Send message ───────────────────────────────────────────────────────────
function doSend() {
  const txt = $('input').value.trim();
  if (!txt || selIdx < 0) return;
  bridge.sendMessage(txt);

  // Optimistic add
  const log = $('log');
  const wc  = $('welcome');
  if (wc) wc.remove();

  const now = new Date();
  const h = now.getHours() % 12 || 12;
  const m = String(now.getMinutes()).padStart(2,'0');
  const ap = now.getHours() >= 12 ? 'PM' : 'AM';
  const line = document.createElement('span');
  line.className = 'mpfx out';
  line.textContent = `You [${h}:${m} ${ap}]:`;
  const body = document.createElement('span');
  body.className = 'mtxt';
  body.textContent = txt;
  log.appendChild(line);
  log.appendChild(body);
  log.scrollTop = log.scrollHeight;
  $('input').value = '';
  updateLen();
}

$('btn-send').onclick = doSend;
$('input').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } };

// ── Message length counter ─────────────────────────────────────────────────
function updateLen() {
  const n = $('input').value.length;
  $('mlen-cnt').textContent = n + '/1024';
  $('mlen-fill').style.width = Math.min(100,(n/1024)*100) + '%';
}
$('input').oninput = updateLen;

// ── Util ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Clock ──────────────────────────────────────────────────────────────────
function tick() {
  const n = new Date();
  const h = n.getHours()%12||12, m = String(n.getMinutes()).padStart(2,'0');
  $('outer-tb-title').textContent = 'ICQ Messenger  •  ' + h+':'+m+(n.getHours()>=12?' PM':' AM');
}
tick(); setInterval(tick, 30000);
</script>
</body>
</html>
