<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ICQ</title>
<style>
/* ═══ RESET & VARS ════════════════════════════════════════════════════════ */
:root {
  --bg:      #C0C0C0;
  --white:   #FFFFFF;
  --dark:    #808080;
  --black:   #000000;
  --tb:      linear-gradient(90deg, #000080 0%, #1084D0 100%);
  --online:  #006600;
  --blue:    #0000CC;
  --red:     #CC0000;
  --f: 'Tahoma','MS Sans Serif','Arial',sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: var(--f);
  font-size: 12px;
  overflow: hidden;
  color: var(--black);
  user-select: none;
}

/* ═══ OUTER WINDOW CHROME ═════════════════════════════════════════════════ */
#app-titlebar {
  height: 22px;
  background: var(--tb);
  display: flex; align-items: center;
  padding: 0 3px;
  -webkit-app-region: drag;
  flex-shrink: 0;
}
#app-titlebar-icon { font-size: 12px; margin-right: 4px; }
#app-titlebar-text { flex: 1; color: #fff; font-size: 11px; font-weight: bold; }
#app-titlebar-btns { display: flex; gap: 1px; -webkit-app-region: no-drag; }
.win-btn {
  width: 16px; height: 14px;
  background: var(--bg);
  border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 7px; font-weight: bold; color: var(--black);
}
.win-btn:active { border-color: var(--dark) var(--white) var(--white) var(--dark); }
.win-btn.close { color: #000; font-size: 8px; }

/* ═══ MAIN LAYOUT ═════════════════════════════════════════════════════════ */
#layout {
  display: flex;
  height: calc(100vh - 22px);
  gap: 2px;
  padding: 2px;
  background: var(--bg);
}

/* ═══ CHAT PANEL (left) ═══════════════════════════════════════════════════ */
#chat-panel {
  flex: 1;
  display: flex; flex-direction: column;
  min-width: 0;
  border: 2px solid; border-color: var(--dark) var(--white) var(--white) var(--dark);
  background: var(--bg);
}
/* Chat title bar */
#chat-titlebar {
  height: 22px; flex-shrink: 0;
  background: var(--tb);
  display: flex; align-items: center; padding: 0 3px;
}
#chat-title-icon { font-size: 12px; margin-right: 4px; }
#chat-title-text { flex: 1; color: #fff; font-size: 11px; font-weight: bold; }
#chat-title-btns { display: flex; gap: 1px; }
/* User details fieldset */
#user-details {
  flex-shrink: 0;
  margin: 3px 5px 2px;
  padding: 1px 8px 3px;
  border: 1px solid var(--dark);
  background: var(--bg);
}
#user-details legend { font-size: 11px; padding: 0 3px; }
#user-details-row {
  display: flex; align-items: center;
  gap: 4px; flex-wrap: wrap;
  font-size: 11px;
}
.ud-label { font-weight: bold; }
/* Message log */
#msg-log {
  flex: 1; overflow-y: auto;
  margin: 0 5px;
  border: 2px solid; border-color: var(--dark) var(--white) var(--white) var(--dark);
  background: var(--white);
  padding: 4px 6px;
  font-size: 12px;
  line-height: 1.5;
  min-height: 0;
}
.msg-prefix-out { color: var(--blue); font-weight: bold; }
.msg-prefix-in  { color: var(--red);  font-weight: bold; }
.msg-text { color: #000; }
.msg-block { margin-bottom: 2px; }
/* Send bar */
#send-bar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 5px;
  padding: 3px 5px;
  background: var(--bg);
  border-top: 1px solid var(--white);
}
#send-icons { display: flex; gap: 2px; }
.send-icon-btn {
  width: 22px; height: 20px;
  background: var(--bg);
  border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px;
}
#msg-len-label { font-size: 10px; color: var(--dark); white-space: nowrap; }
#msg-len-bar {
  width: 70px; height: 11px;
  border: 1px solid; border-color: var(--dark) var(--white) var(--white) var(--dark);
  background: var(--white); flex-shrink: 0;
}
#msg-len-fill { height: 100%; background: #FFFF00; width: 0; }
#msg-len-count { font-size: 11px; font-weight: bold; white-space: nowrap; }
#send-btn {
  margin-left: auto;
  padding: 2px 16px;
  font-size: 11px; font-weight: bold;
  font-family: var(--f);
  background: var(--bg); cursor: pointer;
  border: 2px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
}
#send-btn:active { border-color: var(--dark) var(--white) var(--white) var(--dark); }
/* Text input */
#msg-input {
  flex-shrink: 0;
  margin: 2px 5px 4px;
  height: 64px;
  border: 2px solid; border-color: var(--dark) var(--white) var(--white) var(--dark);
  padding: 3px 4px;
  font-family: var(--f);
  font-size: 12px;
  resize: none;
  background: var(--white);
  color: #000;
  outline: none;
  user-select: text;
}

/* ═══ CONTACT LIST (right) ════════════════════════════════════════════════ */
#cl-panel {
  width: 260px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  border: 2px solid; border-color: var(--dark) var(--white) var(--white) var(--dark);
  background: var(--bg);
}
/* CL title bar */
#cl-titlebar {
  height: 22px; flex-shrink: 0;
  background: var(--tb);
  display: flex; align-items: center; padding: 0 3px;
}
#cl-titlebar-icon { font-size: 12px; margin-right: 3px; }
#cl-titlebar-text { flex: 1; color: #fff; font-size: 11px; font-weight: bold; }
#cl-titlebar-btns { display: flex; gap: 1px; }
/* CL header row */
#cl-header {
  flex-shrink: 0;
  height: 26px; display: flex; align-items: center; gap: 2px;
  padding: 0 3px;
  border-bottom: 1px solid var(--dark);
  background: var(--bg);
}
.cl-hdr-btn {
  width: 24px; height: 20px;
  background: var(--bg);
  border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 10px;
}
/* CL list */
#cl-list {
  flex: 1; overflow-y: auto; min-height: 0;
  background: var(--white);
  border: 2px solid; border-color: var(--dark) var(--white) var(--white) var(--dark);
  margin: 2px 3px;
}
.cl-section {
  padding: 2px 8px 1px;
  font-size: 10px; color: var(--dark);
  background: var(--white);
  border-bottom: 1px solid #D0D0D0;
}
.cl-item {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 6px;
  cursor: pointer;
  font-size: 12px;
  background: var(--white);
  border-bottom: 1px solid #F0F0F0;
  min-height: 20px;
}
.cl-item:hover { background: #D6EEDA; }
.cl-item.selected { background: #000080; }
.cl-item.selected .cl-name { color: #fff !important; }
.cl-flower { font-size: 12px; flex-shrink: 0; }
.cl-name { font-weight: bold; color: var(--online); flex: 1; }
.cl-name.offline { color: var(--dark) !important; }
.cl-unread {
  background: #FF0000; color: #fff;
  font-size: 9px; font-weight: bold;
  padding: 0 3px; min-width: 14px;
  text-align: center;
}
/* CL bottom */
#cl-bottom {
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 1px;
  padding: 2px 3px 3px;
  border-top: 1px solid var(--white);
}
.cl-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 6px;
  font-size: 11px; font-weight: bold;
  font-family: var(--f); color: var(--black);
  background: var(--bg); cursor: pointer;
  border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
}
.cl-btn:active { border-color: var(--dark) var(--white) var(--white) var(--dark); }
.cl-avail {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 6px;
  font-size: 11px; font-weight: bold;
  font-family: var(--f); color: var(--black);
  background: var(--bg);
  border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
}

/* ═══ WELCOME / STATUS STATES ══════════════════════════════════════════════ */
#welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--dark);
}
#welcome .w-flower { font-size: 48px; }
#welcome .w-title  { font-size: 18px; font-weight: bold; color: #000; }
#welcome .w-sub    { font-size: 12px; text-align: center; }
#welcome.hidden { display: none; }

/* ═══ SCROLLBARS ══════════════════════════════════════════════════════════ */
::-webkit-scrollbar       { width: 16px; height: 16px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb {
  background: var(--bg);
  border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white);
}
::-webkit-scrollbar-button { display: block; width: 16px; height: 16px; background: var(--bg); border: 1px solid; border-color: var(--white) var(--dark) var(--dark) var(--white); }
</style>
</head>
<body>

<!-- ── Outer window title bar ── -->
<div id="app-titlebar">
  <span id="app-titlebar-icon">🌸</span>
  <span id="app-titlebar-text">ICQ Messenger</span>
  <div id="app-titlebar-btns">
    <div class="win-btn" id="btn-min">_</div>
    <div class="win-btn" id="btn-max">□</div>
    <div class="win-btn close" id="btn-close">✕</div>
  </div>
</div>

<!-- ── Two-panel layout ── -->
<div id="layout">

  <!-- LEFT: Chat window -->
  <div id="chat-panel">
    <div id="chat-titlebar">
      <span id="chat-title-icon">🌸</span>
      <span id="chat-title-text">ICQ — Select a contact</span>
      <div id="chat-title-btns">
        <div class="win-btn">_</div>
        <div class="win-btn">□</div>
        <div class="win-btn close">✕</div>
      </div>
    </div>

    <!-- User Details fieldset -->
    <fieldset id="user-details">
      <legend>User Details</legend>
      <div id="user-details-row">
        <span class="ud-label">Nick:</span>
        <span id="ud-nick">—</span>
        &nbsp;&nbsp;
        <span class="ud-label">ICQ#:</span>
        <span id="ud-icq">692648192</span>
        &nbsp;&nbsp;
        <span class="ud-label">Status:</span>
        <span id="ud-status">🌸</span>
      </div>
    </fieldset>

    <!-- Message log OR welcome state -->
    <div id="msg-log">
      <div id="welcome">
        <div class="w-flower">🌸</div>
        <div class="w-title">ICQ</div>
        <div class="w-sub" id="status-msg">Connecting to WhatsApp…</div>
      </div>
    </div>

    <!-- Send bar -->
    <div id="send-bar">
      <div id="send-icons">
        <div class="send-icon-btn" title="Emoticons">😊</div>
        <div class="send-icon-btn" title="Font">🔤</div>
      </div>
      <span id="msg-len-label">Message Length</span>
      <div id="msg-len-bar"><div id="msg-len-fill"></div></div>
      <span id="msg-len-count">0/1024</span>
      <button id="send-btn">Send</button>
    </div>

    <!-- Text input -->
    <textarea id="msg-input" placeholder="Type a message…" maxlength="1024"></textarea>
  </div>

  <!-- RIGHT: Contact list -->
  <div id="cl-panel">
    <div id="cl-titlebar">
      <span id="cl-titlebar-icon">🌸</span>
      <span id="cl-titlebar-text">22536582</span>
      <div id="cl-titlebar-btns">
        <div class="win-btn">_</div>
        <div class="win-btn">□</div>
        <div class="win-btn close">✕</div>
      </div>
    </div>

    <div id="cl-header">
      <div class="cl-hdr-btn" style="font-size:8px;font-weight:bold;font-style:italic">ICQ</div>
      <div class="cl-hdr-btn">🌸</div>
      <div class="cl-hdr-btn">👤</div>
      <div class="cl-hdr-btn">🔍</div>
      <div class="cl-hdr-btn">📋</div>
    </div>

    <div id="cl-list">
      <div class="cl-section">── Loading ──</div>
    </div>

    <div id="cl-bottom">
      <button class="cl-btn">🌸 System</button>
      <button class="cl-btn">🔍 Search/Add Users</button>
      <div class="cl-avail">🌸 Available <span style="margin-left:auto">▼</span></div>
    </div>
  </div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const state = {
  contacts:     [],
  messages:     [],
  chatName:     '',
  selectedIdx:  -1,
  waReady:      false,
};

// ─── Elements ────────────────────────────────────────────────────────────────
const chatTitleText = document.getElementById('chat-title-text');
const udNick        = document.getElementById('ud-nick');
const msgLog        = document.getElementById('msg-log');
const welcome       = document.getElementById('welcome');
const statusMsg     = document.getElementById('status-msg');
const clList        = document.getElementById('cl-list');
const msgInput      = document.getElementById('msg-input');
const sendBtn       = document.getElementById('send-btn');
const lenCount      = document.getElementById('msg-len-count');
const lenFill       = document.getElementById('msg-len-fill');

// ─── ICQ bridge (exposed by preload.js) ──────────────────────────────────────
const icq = window.icq;

// ─── Window controls ─────────────────────────────────────────────────────────
document.getElementById('btn-min').addEventListener('click',   () => icq.minimize());
document.getElementById('btn-max').addEventListener('click',   () => icq.maximize());
document.getElementById('btn-close').addEventListener('click', () => icq.close());

// ─── Status updates from main ────────────────────────────────────────────────
icq.onStatus((d) => {
  if (d.status === 'qr') {
    statusMsg.textContent = d.msg || 'Scan QR code in the WhatsApp window.';
  } else if (d.status === 'ready') {
    statusMsg.textContent = 'Select a contact to start chatting.';
    state.waReady = true;
  }
});

// ─── Data updates from main ───────────────────────────────────────────────────
icq.onData((data) => {
  state.contacts = data.contacts || [];
  state.messages = data.messages || [];
  state.chatName = data.chatName || '';

  renderContactList();
  if (state.chatName) renderMessages();
});

// ─── Render contact list ──────────────────────────────────────────────────────
function renderContactList() {
  const contacts = state.contacts;
  if (!contacts.length) {
    clList.innerHTML = '<div class="cl-section">── Loading ──</div>';
    return;
  }

  let html = '<div class="cl-section">── Online ──</div>';
  contacts.forEach((c, i) => {
    const sel     = i === state.selectedIdx ? ' selected' : '';
    const unread  = c.unread ? `<span class="cl-unread">${c.unread}</span>` : '';
    html += `
      <div class="cl-item${sel}" data-idx="${i}">
        <span class="cl-flower">🌸</span>
        <span class="cl-name">${escHtml(c.name)}</span>
        ${unread}
      </div>`;
  });
  clList.innerHTML = html;

  clList.querySelectorAll('.cl-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx, 10);
      state.selectedIdx = idx;
      const contact = state.contacts[idx];
      if (contact) {
        // Tell hidden WA to open this chat
        icq.clickContact(idx);
        // Update ICQ title bar immediately
        updateChatTitle(contact.name);
      }
    });
  });
}

// ─── Render messages ──────────────────────────────────────────────────────────
let lastMsgCount = 0;
function renderMessages() {
  const msgs = state.messages;
  if (!msgs.length) return;

  // Only re-render if message count changed (avoid scroll jumping)
  if (msgs.length === lastMsgCount) return;
  lastMsgCount = msgs.length;

  // Remove welcome screen
  welcome.classList.add('hidden');

  let html = '';
  msgs.forEach(m => {
    const who = m.isOut ? 'You' : escHtml(state.chatName);
    const time = m.time ? ` [${m.time}]` : '';
    const cls  = m.isOut ? 'msg-prefix-out' : 'msg-prefix-in';
    html += `
      <div class="msg-block">
        <div class="${cls}">${who}${time}:</div>
        <div class="msg-text">${escHtml(m.text)}</div>
      </div>`;
  });

  // Keep scroll at bottom if user is at bottom
  const atBottom = msgLog.scrollHeight - msgLog.scrollTop - msgLog.clientHeight < 40;
  msgLog.innerHTML = html;
  if (atBottom) msgLog.scrollTop = msgLog.scrollHeight;
}

// ─── Update chat title ────────────────────────────────────────────────────────
function updateChatTitle(name) {
  chatTitleText.textContent = `${name} Message Dialog`;
  udNick.textContent = name;
  welcome.classList.add('hidden');
}

// ─── Send message ─────────────────────────────────────────────────────────────
function doSend() {
  const text = msgInput.value.trim();
  if (!text || state.selectedIdx < 0) return;
  icq.sendMessage(text);
  // Optimistic: add to log immediately
  const now = new Date();
  const h = now.getHours() % 12 || 12;
  const m = String(now.getMinutes()).padStart(2,'0');
  const ap = now.getHours() >= 12 ? 'PM' : 'AM';
  const block = document.createElement('div');
  block.className = 'msg-block';
  block.innerHTML = `
    <div class="msg-prefix-out">You [${h}:${m} ${ap}]:</div>
    <div class="msg-text">${escHtml(text)}</div>`;
  msgLog.appendChild(block);
  msgLog.scrollTop = msgLog.scrollHeight;
  msgInput.value = '';
  updateMsgLen();
}

sendBtn.addEventListener('click', doSend);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
});

// ─── Message length counter ───────────────────────────────────────────────────
function updateMsgLen() {
  const len = msgInput.value.length;
  lenCount.textContent = `${len}/1024`;
  lenFill.style.width = Math.min(100, (len / 1024) * 100) + '%';
}
msgInput.addEventListener('input', updateMsgLen);

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Clock in title bar ───────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours() % 12 || 12;
  const m = String(now.getMinutes()).padStart(2,'0');
  const ap = now.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('app-titlebar-text').textContent =
    `ICQ Messenger  —  ${h}:${m} ${ap}`;
}
updateClock();
setInterval(updateClock, 30000);
</script>
</body>
</html>
